name: SDK轻量化编译插件（仅IPK）
on:
  workflow_dispatch:
    inputs:
      pkg_list:
        description: '待编译插件，空格分隔'
        required: true
        default: 'luci-app-vnt luci-app-quickfile-go luci-theme-argon luci-app-quickstart'
      target_arch:
        description: '架构 aarch64_cortex-a53 / x86_64'
        required: true
        default: 'aarch64_cortex-a53'
      sdk_branch:
        description: 'SDK分支 SNAPSHOT / openwrt-25.12 / openwrt-22.03'
        required: true
        default: 'SNAPSHOT'
      tag:
        description: 'Release标签，留空仅存产物'
        required: false
        default: ''
      release_text:
        description: 'Release备注'
        required: false
        default: 'SDK轻量化编译插件IPK'

env:
  TZ: Asia/Shanghai
permissions:
  contents: write

jobs:
  compile_sdk:
    name: SDK Build ${{ github.event.inputs.target_arch }}-${{ github.event.inputs.sdk_branch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 第三方封装SDK一键编译Action，无需手动拉源码、配置feeds
      - name: SDK一键编译插件
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ github.event.inputs.target_arch }}-${{ github.event.inputs.sdk_branch }}
          FEEDNAME: my_custom_pkg
          PACKAGES: ${{ github.event.inputs.pkg_list }}
          NO_REFRESH_CHECK: true
          V: s

      - name: 上传编译产物到Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SDK-PKG-${{ github.event.inputs.sdk_branch }}-${{ github.event.inputs.target_arch }}
          path: bin/packages/${{ github.event.inputs.target_arch }}/my_custom_pkg/

      - name: 打包zip压缩包
        run: |
          ARCH=${{ github.event.inputs.target_arch }}
          BRANCH=${{ github.event.inputs.sdk_branch }}
          zip -j SDK_${BRANCH}_${ARCH}_$(date '+%Y%m%d-%H%M%S').zip bin/packages/${ARCH}/my_custom_pkg/*
          echo "build_time=$(date '+%Y年%m月%d日 %H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: 发布GitHub Release（仅tag不为空执行）
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.inputs.tag }}
          name: SDK轻量化编译包 ${{ env.build_time }}
          body: |
             > ### 
             - 编译模式：OpenWrt SDK轻量化编译（仅插件，不支持内核kmod）
             - SDK版本：${{ github.event.inputs.sdk_branch }}
             - 目标架构：${{ github.event.inputs.target_arch }}
             - 编译插件列表：`${{ github.event.inputs.pkg_list }}`
             #### 前置依赖
             luci luci-base luci-compat kmod-tun
             #### 离线安装
             opkg install *.ipk
             ${{ github.event.inputs.release_text }}
          files: SDK_${{ github.event.inputs.sdk_branch }}_${{ github.event.inputs.target_arch }}*.zip
          append_body: true
