name: 云端按需编译IPK
on:
  workflow_dispatch:
    inputs:
      pkg_list:
        description: '需要编译的插件包名，多个用空格隔开'
        required: true
        default: 'luci-app-vnt luci-app-quickfile-go luci-theme-argon luci-app-quickstart'
      target_arch:
        description: '目标架构（x86_64 / aarch64_cortex-a53 京东云ipq60xx）'
        required: true
        default: 'aarch64_cortex-a53'
      tag:
        description: 'Release版本标签，留空仅上传产物不发布版本'
        required: false
        default: ''
      release_text:
        description: 'Release更新说明'
        required: false
        default: 'ImmortalWrt SNAPSHOT master 离线IPK安装包'

env:
  USTC_GITHUB_MIRROR: https://mirrors.ustc.edu.cn/github-mirror
  USTC_IMMORTALWRT: https://mirrors.ustc.edu.cn/immortalwrt
  WGET_OPTS: "--timeout=60 --tries=5"
  TARGET_DIR: immortalwrt
  TZ: Asia/Shanghai
permissions:
  contents: write

jobs:
  compile_pkg:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取当前编译仓库完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装全套依赖 + 系统可信根证书（解决SSL证书报错）
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file ccache jq ca-certificates
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 缓存编译文件（dl/staging/build 提速二次编译）
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.TARGET_DIR }}/dl
            ${{ env.TARGET_DIR }}/staging_dir
            ${{ env.TARGET_DIR }}/build_dir
          key: ${{ github.workflow }}-${{ github.event.inputs.target_arch }}-${{ github.sha }}

      - name: 修复DNS + 中科大稳定镜像拉取ImmortalWrt源码
        run: |
          echo "nameserver 223.5.5.5" | sudo tee /etc/resolv.conf
          rm -rf ${{ env.TARGET_DIR }}
          git clone https://mirrors.ustc.edu.cn/immortalwrt.git ${{ env.TARGET_DIR }}
          cd ${{ env.TARGET_DIR }}
          git checkout master
          git pull

      - name: 注入自定义编译脚本
        run: |
          cp customize.sh ${{ env.TARGET_DIR }}/
          cp build_pkg.sh ${{ env.TARGET_DIR }}/
          cd ${{ env.TARGET_DIR }}
          chmod +x customize.sh build_pkg.sh
          export WGET_OPTS="${WGET_OPTS}"
          export USTC_GITHUB_MIRROR="${USTC_GITHUB_MIRROR}"
          export USTC_IMMORTALWRT="${USTC_IMMORTALWRT}"
          ./customize.sh

      - name: 初始化硬件平台.config
        env:
          TARGET_ARCH: ${{ github.event.inputs.target_arch }}
        run: |
          cd ${{ env.TARGET_DIR }}
          rm -f .config
          if [[ "$TARGET_ARCH" == "x86_64" ]]; then
            echo "CONFIG_TARGET_x86=y" > .config
            echo "CONFIG_TARGET_x86_64=y" >> .config
            echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          elif [[ "$TARGET_ARCH" == "aarch64_cortex-a53" ]]; then
            # 京东云AX6600 ipq60xx 平台
            echo "CONFIG_TARGET_qualcommax=y" > .config
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_ax6600=y" >> .config
          fi
          echo "CONFIG_USE_APK=n" >> .config
          echo "CONFIG_SIGN_PACKAGES=n" >> .config
          echo "CONFIG_AUTOREMOVE=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig

      - name: 一键批量编译指定插件IPK
        env:
          TARGET_ARCH: ${{ github.event.inputs.target_arch }}
          PKG_LIST: ${{ github.event.inputs.pkg_list }}
        run: |
          cd ${{ env.TARGET_DIR }}
          export WGET_OPTS="${WGET_OPTS}"
          ./build_pkg.sh $PKG_LIST

      - name: 打包全架构下所有分类IPK
        env:
          TARGET_ARCH: ${{ github.event.inputs.target_arch }}
        run: |
          ARCH=${{ github.event.inputs.target_arch }}
          cd ${{ env.TARGET_DIR }}/bin/packages/${ARCH}
          tar -zcvf ipk_${ARCH}_$(date '+%Y%m%d-%H%M%S').tar.gz .
          mv *.tar.gz ../
          echo "build_time=$(date '+%Y年%m月%d日 %H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: 上传产物至Artifacts（无Release也能下载）
        uses: actions/upload-artifact@v4
        with:
          name: IPK-PACK-${{ github.event.inputs.target_arch }}
          path: ${{ env.TARGET_DIR }}/bin/packages/${{ github.event.inputs.target_arch }}/*.tar.gz

      - name: 发布GitHub Release（仅填写tag才执行）
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.inputs.tag }}
          name: 插件IPK编译包 ${{ env.build_time }}
          body: |
             > ### 
             - 固件分支：ImmortalWrt SNAPSHOT master 滚动内核
             - 目标架构：${{ github.event.inputs.target_arch }}
             - 本次编译插件：`${{ github.event.inputs.pkg_list }}`

             #### 安装前置依赖
             路由软件包预先安装：`luci luci-base luci-compat kmod-tun`
             #### 离线安装命令
             ```bash
             opkg install *.ipk
